{% set name = "py7zr" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f6bfee81637c9032f6a9f0eb045a4bfc7a7ff4138becfc42d7cb89b54ffbfef1

build:
  number: 0
  entry_points:
    - py7zr = py7zr.__main__:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  host:
    - pip
    - python
    - setuptools >=63
    - setuptools-scm >=7.0.5
    - python-build
  run:
    - python
    - texttable
    - pycryptodomex >=3.20.0
    - brotli-python >=1.1.0
    - brotlicffi >=1.1.0.0
    - psutil
    - pyzstd >=0.16.1
    - pyppmd >=1.1.0,<1.3.0
    - pybcj >=1.0.0,<1.1.0
    - multivolumefile >=0.2.3
    - inflate64 >=1.0.0,<1.1.0

# ERROR    root:test_concurrent.py:79 Caught error: <urlopen error [Errno 60] Operation timed out>
{% set deselect_tests = " --deselect=tests/test_concurrent.py::test_concurrent_futures" %}

test:
  source_files:
    - tests
  imports:
    - py7zr
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v tests {{ deselect_tests }}
    - py7zr --help
  requires:
    - pip
    - pytest
    - pytest-benchmark
    - py-cpuinfo
    - requests
    - pytest-httpserver

about:
  description: |
    py7zr is a library and utility to support 7zip archive compression, decompression,
    encryption and decryption written by Python programming language.
  home: https://github.com/miurahr/py7zr
  dev_url: https://github.com/miurahr/py7zr
  doc_url: https://github.com/miurahr/py7zr#readme
  summary: Pure python 7-zip library
  license: LGPL-2.1-or-later
  license_family: LGPL
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sarthakpati